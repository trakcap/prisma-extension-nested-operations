name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Git checkout
        uses: actions/checkout@v6

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@trakcap'
          cache: yarn

      - name: Install dependencies
        run: yarn --immutable

      - name: Build package
        run: yarn build

      - name: Publish to registry
        run: |
          TAG=$(jq -r '.version | if contains("-") then split("-")[1] | split(".")[0] else "" end' package.json)
          if [ -n "$TAG" ]; then
            yarn npm publish --tag "$TAG"
          else
            yarn npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
